<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F2 — Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; background: #f9fafb; padding: 40px; }

    .form-container {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .form-subtitle {
      font-size: 14px;
      color: #6b7280;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    label {
      font-size: 14px;
      font-weight: 500;
      color: #344054;
    }

    input[type="text"],
    input[type="email"] {
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      color: #101828;
      background: #ffffff;
    }

    input::placeholder {
      color: #98a2b3;
    }

    select {
      font-size: 14px;
      padding: 10px 14px;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      color: #101828;
      background: #ffffff;
      appearance: none;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .checkbox-label {
      font-size: 14px;
      color: #344054;
    }

    .checkbox-description {
      font-size: 12px;
      color: #98a2b3;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px solid #eaecf0;
    }

    .btn-primary {
      font-size: 14px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      border: none;
    }

    .btn-secondary {
      font-size: 14px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 8px;
      background: #ffffff;
      color: #344054;
      border: 1px solid #d0d5dd;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-header">
      <h3 class="form-title">Create new project</h3>
      <p class="form-subtitle">Fill in the details to set up a new project for your team.</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="name">Project name</label>
        <input type="text" id="name" placeholder="Enter project name">
      </div>
      <div class="form-group">
        <label for="owner">Owner</label>
        <input type="text" id="owner" placeholder="Select owner">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Notification email</label>
      <input type="email" id="email" placeholder="you@company.com">
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category">
        <option>Engineering</option>
        <option>Design</option>
        <option>Marketing</option>
        <option>Product</option>
      </select>
    </div>

    <div class="form-group">
      <label>Permissions</label>
      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="perm1" checked>
          <div>
            <div class="checkbox-label">Allow public access</div>
            <div class="checkbox-description">Anyone in the organization can view this project</div>
          </div>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="perm2">
          <div>
            <div class="checkbox-label">Require approval for changes</div>
            <div class="checkbox-description">Changes must be reviewed before they take effect</div>
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-secondary">Cancel</button>
      <button class="btn-primary">Create project</button>
    </div>
  </div>
</body>
</html>
